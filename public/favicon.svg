<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="candy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E91E8C"/>
      <stop offset="50%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#FFD23F"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="2" y="2" width="28" height="28" rx="6" fill="url(#candy)"/>
  <!-- Candy wrapper shape -->
  <ellipse cx="16" cy="16" rx="8" ry="7" fill="white" opacity="0.95"/>
  <!-- Wrapper twists -->
  <path d="M4 12 L8 16 L4 20" stroke="white" stroke-width="2" fill="none" opacity="0.8"/>
  <path d="M28 12 L24 16 L28 20" stroke="white" stroke-width="2" fill="none" opacity="0.8"/>
  <!-- Click arrow -->
  <path d="M13 13 L19 16 L13 19Z" fill="#E91E8C"/>
</svg>
